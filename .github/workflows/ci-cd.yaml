name: Application CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: application-ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: desafio-alice
  REGISTRY_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pipenv
        run: pip install pipenv

      - name: Install project dependencies
        run: pipenv install --dev

      - name: Run unit tests
        run: pipenv run pytest -v

  build-and-publish:
    name: Build & Publish Container
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-metadata.outputs.image }}
      short_sha: ${{ steps.image-metadata.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure container image metadata
        id: image-metadata
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY }}/${{ env.APP_NAME }}:${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Build container image
        run: docker build -t "${IMAGE}" .

      - name: Scan container image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Authenticate to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Push container image to registry
        run: docker push "${IMAGE}"

  deploy-gitops:
    name: Deploy (GitOps)
    needs: build-and-publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes deployment image tag
        run: |
          SHORT_SHA="${{ needs.build-and-publish.outputs.short_sha }}"

          if ! grep -qE '^[[:space:]]*image:[[:space:]]*.+:.+' k8s/deployment.yaml; then
            echo "Error: k8s/deployment.yaml must define a full image reference with tag (registry/app:tag)"
            exit 1
          fi

          sed -i "s|\(image:[[:space:]]*.*\):[^[:space:]]*$|\1:${SHORT_SHA}|" k8s/deployment.yaml
          echo "Updated manifest:"
          grep 'image:' k8s/deployment.yaml

      - name: Commit and push GitOps manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No manifest changes to commit" && exit 0
          git commit -m "chore(gitops): update image tag to ${{ needs.build-and-publish.outputs.short_sha }} [skip ci]"
          git push
