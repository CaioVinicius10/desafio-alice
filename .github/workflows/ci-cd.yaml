name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write

env:
  APP_NAME: desafio-alice
  REGISTRY_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run tests
        run: pipenv run pytest -v

  build-scan-push:
    name: Build, Scan and Push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          IMAGE="${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: docker build -t "${IMAGE}" .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Push Docker image
        run: docker push "${IMAGE}"

  gitops:
    name: GitOps Deploy
    needs: build-scan-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update deployment image
        run: |
          IMAGE="${{ needs.build-scan-push.outputs.image }}"
          sed -i "s|image: .*|image: ${IMAGE}|" k8s/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(gitops): update image to ${GITHUB_SHA} [skip ci]"
          git push
