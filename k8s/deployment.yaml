apiVersion: apps/v1
kind: Deployment
metadata:
  name: desafio-alice
  namespace: desafio-alice
  labels:
    app.kubernetes.io/name: desafio-alice
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: desafio-alice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: desafio-alice
    spec:
      containers:
        - name: desafio-alice
          image: us-central1-docker.pkg.dev/app1-349916/desafio/desafio-alice:0eca84e
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
